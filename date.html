<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>


const now = new Date();

console.log("Full Date:", now);
console.log("Year:", now.getFullYear());
console.log("Month:", now.getMonth() + 1); // 0-based
console.log("Date:", now.getDate());
console.log("Hours:", now.getHours());
console.log("Minutes:", now.getMinutes());
console.log("Seconds:", now.getSeconds());

document.write("Full Date:", now);
console.log("Year:", now.getFullYear());
console.log("Month:", now.getMonth() + 1); // 0-based
console.log("Date:", now.getDate());
console.log("Hours:", now.getHours());
console.log("Minutes:", now.getMinutes());
console.log("Seconds:", now.getSeconds());

const date = new Date();

// MM/DD/YYYY
let usFormat = (date.getMonth() + 1) + "/" + date.getDate() + "/" + date.getFullYear();

// DD/MM/YYYY
let indiaFormat = date.getDate() + "/" + (date.getMonth() + 1) + "/" + date.getFullYear();

console.log("US Format:", usFormat);
console.log("India Format:", indiaFormat);

const today = new Date();

    </script>
</body>
</html>
