<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function factorial(num){
            result=1;
        for(var i=2;i<=num;i++){
            result=result*i;
        }
        return result;    
        }
        console.log("The Factorial of 4 is:"+factorial(4))
        console.log("The Factorial of 5 is:"+factorial(5))
        document.write("The Factorial of 4 is:",factorial(4))
        document.write("<br>")
        document.write("The Factorial of 5 is:",factorial(5))
        

    </script>
</body>
</html>
