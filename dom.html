<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        h1=document.createElement("h1")
        h1.innerText="Welcome to PARUL"
        document.body.appendChild(h1)
        document.body.style.backgroundColor="lightblue"
        document.body.style.textAlign="center"
        document.body.style.fontFamily="Arial, sans-serif"
        document.body.style.padding="20px"
        document.body.style.color="white"
        document.body.style.border="2px solid darkblue"
        document.body.style.borderRadius="10px"
        document.body.style.margin="20px"
        document.body.style.boxShadow="0 4px 8px rgba(0, 0, 0, 0.1)"
        document.body.style.maxWidth="600px"
        document.body.style.marginLeft="auto"
        document.body.style.marginRight="auto"
        document.body.style.lineHeight="1.6"
        document.body.style.fontSize="18px"
        document.body.style.textTransform="capitalize"
        document.body.style.textDecoration="underline"
        document.body.style.textShadow="2px 2px 4px rgba(0, 0, 0, 0.2)"
        document.body.style.backgroundImage="url('parul.jpg')"
        document.body.style.backgroundSize="cover"
        document.body.style.backgroundPosition="center"


        document.body.style.backgroundAttachment="fixed"

        document.writeln("<p>This is a sample paragraph to demonstrate various styling options using JavaScript.</p>")
        document.body.style.backgroundColor="yellow"
        document.body.style.textAlign="center"
        document.body.style.fontFamily="Verdana, sans-serif"

        document.write("<h1 style='color: darkblue; text-align: center;'>Welcome</h1>")
    </script>
</body>
</html>
